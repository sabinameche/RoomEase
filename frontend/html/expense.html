<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Expense</title>
<link rel="stylesheet" href="../css/expense.css">
</head>

<body>

<header class="navbar">
<div class="logo">🏠 RoomEase</div>

<nav>
<a href="#">Dashboard</a>
<a href="#">Groups</a>
<a href="#">Profile</a>
</nav>
</header>

<div class="container">

<h1>Add Expense</h1>

<div class="card">

<form>

<label>Title</label>
<input type="text" placeholder="Dinner">

<label>Amount</label>
<input type="number" placeholder="100">

<label>Paid By</label>
<select>
<option>Bina</option>
<option>Ram</option>
<option>Hari</option>
</select>

<label>Split Type</label>
<select>
<option>Equal</option>
<option>Percentage</option>
<option>Exact</option>
<option>Shares</option>
</select>

<label>Date</label>
<input type="date">

<button type="submit" class="primary-btn">Add Expense</button>

</form>

</div>

</div>

</body>
</html>
