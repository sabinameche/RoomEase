<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - RoomEase</title>
<link rel="stylesheet" href="../css/dashboard.css">
<link rel="stylesheet" href="../css/group_popup.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
    <div class="logo">
        🏠 RoomEase
    </div>

    <nav>
        <a href="#" class="active">Dashboard</a>
        <a href="http://127.0.0.1:5501/RoomEase/frontend/html/group.html">Groups</a>
        <a href="#">Profile</a>
    </nav>
</header>

<!-- MAIN CONTAINER -->
<div class="container">

    <div class = 'dashboard-header'>
        <h1>Dashboard</h1>
        <button class="primary-btn" id="create-group">+ Create Group</button>
    </div>
    

    <!-- BALANCE CARD -->
    <div class="card">
        <h2>Your Balance</h2>

        <div class="balance-grid">
            <div class="balance-item">
                <p>You Owe</p>
                <h3 class="negative">$30.00</h3>
            </div>

            <div class="balance-item">
                <p>You Are Owed</p>
                <h3 class="positive">$120.00</h3>
            </div>

            <div class="balance-item">
                <p>Net Balance</p>
                <h3 class="positive">$90.00</h3>
            </div>
        </div>
    </div>

    <!-- GROUPS -->
    <div class="card">
        <h2>Your Groups</h2>
        <div class="group" id="groupList">

    </div>

    <!-- RECENT ACTIVITY -->
    <div class="card">
        <h2>Recent Activity</h2>

        <div class="activity">
            <p>🧾 Grocery added by Sabrina</p>
        </div>

        <div class="activity">
            <p>💰 Ram settled $20</p>
        </div>

        <div class="activity">
            <p>⚡ Electricity paid by Hari</p>
        </div>

    </div>

</div>

<div id="modalContainer"></div>

<script>
async function loadModal() {
    const res = await fetch('../html/group_modal.html');
    const html = await res.text();
    document.getElementById('modalContainer').innerHTML = html;
}

loadModal();
</script>
<script type= "module" src="../js/group.js"></script>
<script type= "module" src="../js/dashboard.js"></script>

</body>
</html>
