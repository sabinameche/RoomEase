<!-- GROUP MODAL -->
<div id="groupModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">
            <h2 id="group-form-title">🏠 Create RoomEase Group</h2>
            <span class="close-btn" id = "closeBtn">&times;</span>
        </div>

        <div class="modal-body">

            <div id = "group-title">
            <label>Group Name</label>
            <input type="text" id ="group-name" placeholder="Roommates">
            </div>

            <div id = "currency-label">
            <label>Currency</label>
            <input type="text" id = "currency-type" placeholder="NPR">
            </div>

            <div id="email-box">
            <label>Invite Members</label>

            <div id="email-container">
                <div class="email-row">
                    <input type="email" class = "email-detail" placeholder="Enter email">
                    <button class="addEmail">+</button>
                </div>
            </div>
            </div>

            <button class="create-btn" id="create-group-btn">Create Group</button>
            <button class="edits-btn" id="edit-group-btn">Edit Group</button>
            <button class="invites-btn" id="invite-member-btn">Invite Group</button>
        </div>

    </div>

</div>
